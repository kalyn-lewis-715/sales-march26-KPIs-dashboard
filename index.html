<head>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:#f5f4f0;color:#1a1a1a;padding:24px 32px;}
.container{max-width:1400px;margin:0 auto;}
h1{font-size:26px;font-weight:700;margin-bottom:20px;}
.card{background:#fff;border:1px solid rgba(0,0,0,0.08);border-radius:12px;padding:20px;margin-bottom:20px;}
.controls{display:flex;gap:16px;align-items:center;flex-wrap:wrap;}
.controls label{font-size:13px;font-weight:500;color:#555;}
.controls input[type=date]{padding:6px 10px;border:1px solid #ddd;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;background:#fff;}
.toggle-group{display:flex;border:1px solid #ddd;border-radius:8px;overflow:hidden;}
.toggle-btn{padding:6px 14px;font-size:13px;font-weight:500;border:none;background:#fff;cursor:pointer;font-family:'DM Sans',sans-serif;color:#555;transition:all .15s;}
.toggle-btn.active{background:#185FA5;color:#fff;}

/* Exclusion banner */
.excl-banner{background:#FFF8E6;border:1px solid #F0DFB0;border-left:4px solid #BA7517;border-radius:12px;padding:16px 20px;margin-bottom:20px;}
.excl-banner-title{font-size:14px;font-weight:600;color:#633806;margin-bottom:8px;}
.excl-banner ul{margin-left:16px;margin-bottom:8px;}
.excl-banner li{font-size:13px;color:#633806;margin-bottom:3px;}
details summary{font-size:13px;color:#8B5E1A;cursor:pointer;font-weight:500;margin-top:6px;}
.excl-deal-list{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px;}
.excl-chip{background:#fff;border:1px solid #F0DFB0;border-radius:6px;padding:4px 10px;font-size:12px;color:#633806;}

/* KPI cards */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px;}
.kpi-card{background:#fff;border:1px solid rgba(0,0,0,0.08);border-radius:12px;padding:16px 20px;}
.kpi-label{font-size:12px;font-weight:500;color:#777;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.kpi-value{font-size:24px;font-weight:700;color:#1a1a1a;}
.kpi-delta{font-size:13px;font-weight:500;margin-top:4px;}
.delta-up{color:#3B6D11;}
.delta-down{color:#A32D2D;}
.delta-flat{color:#888;}

/* Bar chart */
.chart-title{font-size:15px;font-weight:600;margin-bottom:20px;}
.chart-wrap{display:flex;align-items:flex-end;gap:8px;height:300px;padding-bottom:0;}
.bar-col{display:flex;flex-direction:column;align-items:center;flex:1;height:100%;}
.bar-delta{font-size:11px;font-weight:600;min-height:18px;margin-bottom:2px;white-space:nowrap;}
.bar-value{font-size:12px;font-weight:600;color:#1a1a1a;margin-bottom:4px;}
.bar-spacer{flex:1;display:flex;align-items:flex-end;width:100%;}
.bar{width:100%;border-radius:6px 6px 0 0;min-height:2px;transition:height .3s;}
.bar-label{font-size:11px;color:#777;margin-top:6px;font-weight:500;}

/* Callouts */
.callout{border-radius:12px;padding:20px;margin-bottom:20px;}
.callout-won{background:#EAF3DE;border:1px solid #C6E0A8;}
.callout-open{background:#E6F1FB;border:1px solid #AECBEE;}
.callout-lost{background:#FCEBEB;border:1px solid #F0B8B8;}
.callout-title{font-size:15px;font-weight:600;margin-bottom:14px;}
.deal-row{display:flex;align-items:flex-start;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.06);}
.deal-row:last-child{border-bottom:none;}
.deal-name{font-size:14px;font-weight:600;margin-bottom:4px;}
.deal-meta{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px;}
.deal-why{font-size:12px;color:#555;margin-top:4px;}
.deal-amt{font-size:15px;font-weight:700;white-space:nowrap;margin-left:16px;padding-top:2px;}
.tag{display:inline-block;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:600;}
.tag-disco{background:#B5D4F4;color:#0a3a6b;}
.tag-predemo{background:#85B7EB;color:#0a2e5c;}
.tag-demo{background:#378ADD;color:#fff;}
.tag-onhold{background:#BA7517;color:#fff;}
.tag-proposal{background:#185FA5;color:#fff;}
.tag-psl{background:#0C447C;color:#fff;}
.tag-awaiting{background:#042C53;color:#fff;}
.tag-won{background:#3B6D11;color:#fff;}
.tag-lost{background:#A32D2D;color:#fff;}
.tag-new{background:#EEEDFE;color:#3C3489;}
.tag-exp{background:#FAEEDA;color:#633806;}
.tag-wb{background:#E1F5EE;color:#085041;}
.lost-detail{font-size:12px;color:#7a2a2a;margin-top:4px;line-height:1.5;}
.empty-msg{font-size:13px;color:#888;padding:8px 0;}
</style>
</head>

const STAGES = ['disco','predemo','demo','onhold','proposal','psl','awaiting','won','lost'];
const OPEN_STAGES = new Set(['disco','predemo','demo','onhold','proposal','psl','awaiting']);
const STAGE_COLORS = {disco:'#B5D4F4',predemo:'#85B7EB',demo:'#378ADD',onhold:'#BA7517',proposal:'#185FA5',psl:'#0C447C',awaiting:'#042C53',won:'#3B6D11',lost:'#A32D2D'};

let metric = 'count';

function setMetric(m) {
  metric = m;
  document.getElementById('btn-count').className = 'toggle-btn' + (m==='count'?' active':'');
  document.getElementById('btn-arr').className = 'toggle-btn' + (m==='arr'?' active':'');
  render();
}

// stageAt: returns stage key at end of targetDateStr (23:59:59 UTC)
function stageAt(deal, dateStr) {
  const target = new Date(dateStr + 'T23:59:59Z').getTime();
  let stage = null;
  for (const h of deal.history) {
    const t = new Date(h.t).getTime();
    if (t <= target) stage = h.s;
    else break;
  }
  return stage;
}

// Is deal closed (won or lost) within [fromDate, toDate] for a given closed stage key?
function closedInRange(deal, stageKey, fromStr, toStr) {
  const from = new Date(fromStr + 'T00:00:00Z').getTime();
  const to = new Date(toStr + 'T23:59:59Z').getTime();
  for (const h of deal.history) {
    if (h.s === stageKey) {
      const t = new Date(h.t).getTime();
      if (t >= from && t <= to) return true;
    }
  }
  return false;
}

function fmt(v) {
  if (metric === 'arr') return '$' + Math.round(v).toLocaleString();
  return String(Math.round(v));
}

function fmtDelta(d) {
  if (d === 0) return {txt:'—', cls:'delta-flat'};
  const sign = d > 0 ? '+' : '';
  const txt = metric === 'arr' ? sign+'$'+Math.abs(Math.round(d)).toLocaleString() : sign+d;
  return {txt: metric==='arr' ? (d>0?'+':'-')+'$'+Math.abs(Math.round(d)).toLocaleString() : sign+d, cls: d>0?'delta-up':'delta-down'};
}

function activeDeals() {
  return ALL_DEALS.filter(d => d.excl === null || d.excl === undefined);
}

function stageMetrics(deals, dateStr) {
  const m = {};
  STAGES.forEach(s => m[s] = {count:0, arr:0});
  for (const d of deals) {
    const s = stageAt(d, dateStr);
    if (s && m[s]) {
      m[s].count++;
      m[s].arr += d.amt || 0;
    }
  }
  return m;
}

function dealTypeTag(type) {
  if (!type) return '';
  if (type.includes('Expansion')) return `<span class="tag tag-exp">${type}</span>`;
  if (type === 'Win Back') return `<span class="tag tag-wb">Win Back</span>`;
  return `<span class="tag tag-new">${type}</span>`;
}

function stageTag(s) {
  return `<span class="tag tag-${s}">${s}</span>`;
}

function topReasons(why, n) {
  if (!why) return '';
  return why.split(';').slice(0,n).map(r => `<span class="tag" style="background:#f0f0f0;color:#444">${r.replace(/^\*/,'').trim()}</span>`).join('');
}

function renderExclBanner() {
  const excl = ALL_DEALS.filter(d => d.excl);
  const banner = document.getElementById('exclBanner');
  if (!excl.length) { banner.style.display='none'; return; }
  banner.style.display='block';
  const naf = excl.filter(d=>d.excl==='not_a_fit');
  const o12 = excl.filter(d=>d.excl==='over_12mo');
  const totalAmt = excl.reduce((s,d)=>s+d.amt,0);
  let html = `<div class="excl-banner-title">${excl.length} deal(s) ($${totalAmt.toLocaleString()} ARR) excluded from this view.</div><ul>`;
  if (naf.length) html += `<li><strong>${naf.length} marked "Unqualified — Not a Fit"</strong> — buyer expectations the AE confirmed Visme couldn't meet during disco/demo</li>`;
  if (o12.length) html += `<li><strong>${o12.length} open longer than 12 months before close-lost</strong> — too stale to reflect current pipeline motion</li>`;
  html += '</ul><details><summary>Show excluded deals</summary><div class="excl-deal-list">';
  if (naf.length) {
    html += '<div style="width:100%;font-size:12px;font-weight:600;color:#8B5E1A;margin-top:6px;">Not a Fit</div>';
    naf.forEach(d => html += `<div class="excl-chip">${d.name} ($${d.amt.toLocaleString()})</div>`);
  }
  if (o12.length) {
    html += '<div style="width:100%;font-size:12px;font-weight:600;color:#8B5E1A;margin-top:6px;">Over 12 Months</div>';
    o12.forEach(d => html += `<div class="excl-chip">${d.name} ($${d.amt.toLocaleString()})</div>`);
  }
  html += '</div></details>';
  banner.innerHTML = html;
}

function renderKPIs(mFrom, mTo, fromStr, toStr) {
  // Prior period
  const priorLen = (new Date(toStr).getTime() - new Date(fromStr).getTime());
  const priorToStr = fromStr;
  const priorFromDate = new Date(new Date(fromStr).getTime() - priorLen);
  const priorFromStr = priorFromDate.toISOString().slice(0,10);
  const mPrior = stageMetrics(activeDeals(), priorFromStr);

  const openFrom = STAGES.filter(s=>OPEN_STAGES.has(s)).reduce((s,k)=>s+mFrom[k][metric],0);
  const openTo = STAGES.filter(s=>OPEN_STAGES.has(s)).reduce((s,k)=>s+mTo[k][metric],0);
  const openPrior = STAGES.filter(s=>OPEN_STAGES.has(s)).reduce((s,k)=>s+mPrior[k][metric],0);

  const acts = activeDeals();
  const wonInRange = acts.filter(d => closedInRange(d,'won',fromStr,toStr));
  const wonPrior = acts.filter(d => closedInRange(d,'won',priorFromStr,priorToStr));
  const wonCount = wonInRange.length;
  const wonArr = wonInRange.reduce((s,d)=>s+d.amt,0);
  const wonCountPrior = wonPrior.length;
  const wonArrPrior = wonPrior.reduce((s,d)=>s+d.amt,0);

  // Total in pipeline at "To" (any stage, not just open)
  const totalTo = STAGES.reduce((s,k)=>s+mTo[k][metric],0);
  const totalFrom = STAGES.reduce((s,k)=>s+mFrom[k][metric],0);

  const kpis = [
    {label:'Deals in Pipeline (@ To)', val: totalTo, delta: totalTo - totalFrom, isMoney: metric==='arr'},
    {label:'Open Pipeline ARR', val: metric==='arr' ? openTo : openTo, delta: openTo - openFrom, isMoney: metric==='arr'},
    {label:'Won Deals in Period', val: metric==='count' ? wonCount : wonArr, delta: metric==='count' ? wonCount-wonCountPrior : wonArr-wonArrPrior, isMoney: metric==='arr'},
    {label:'Won ARR in Period', val: wonArr, delta: wonArr - wonArrPrior, isMoney: true, forceArr: true},
  ];

  const row = document.getElementById('kpiRow');
  row.innerHTML = kpis.map(k => {
    const v = (k.forceArr || k.isMoney) ? '$' + Math.round(k.val).toLocaleString() : Math.round(k.val);
    const {txt, cls} = fmtDelta(k.delta);
    const dv = k.forceArr ? (k.delta>=0?'+':'-')+'$'+Math.abs(Math.round(k.delta)).toLocaleString() : txt;
    return `<div class="kpi-card">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value">${v}</div>
      <div class="kpi-delta ${cls}">${dv} vs From date</div>
    </div>`;
  }).join('');
}

function renderChart(mFrom, mTo) {
  const vals = STAGES.map(s => mTo[s][metric]);
  const deltas = STAGES.map(s => mTo[s][metric] - mFrom[s][metric]);
  const max = Math.max(...vals, 1);
  // Nice ceiling
  const rawCeil = Math.ceil(max * 1.15);
  const step = rawCeil <= 10 ? 1 : rawCeil <= 50 ? 5 : rawCeil <= 100 ? 10 : rawCeil <= 500 ? 50 : 100;
  const ceil = Math.ceil(rawCeil / step) * step;

  const wrap = document.getElementById('chartWrap');
  const labels = document.getElementById('chartLabels');
  const CHART_H = 260; // px for bars area

  wrap.innerHTML = '';
  labels.innerHTML = '';

  STAGES.forEach((s, i) => {
    const v = vals[i];
    const d = deltas[i];
    const barH = ceil > 0 ? Math.round((v / ceil) * CHART_H) : 0;
    const {txt, cls} = fmtDelta(d);

    const col = document.createElement('div');
    col.style.cssText = 'flex:1;display:flex;flex-direction:column;align-items:center;';

    // delta label row (fixed at top)
    const dEl = document.createElement('div');
    dEl.className = 'bar-delta ' + cls;
    dEl.textContent = d !== 0 ? txt : '—';
    col.appendChild(dEl);

    // value label
    const vEl = document.createElement('div');
    vEl.className = 'bar-value';
    vEl.textContent = metric === 'arr' && v > 0 ? '$'+Math.round(v/1000)+'k' : v;
    col.appendChild(vEl);

    // spacer + bar
    const spacer = document.createElement('div');
    spacer.style.cssText = `flex:1;display:flex;align-items:flex-end;width:100%;`;
    const bar = document.createElement('div');
    bar.className = 'bar';
    bar.style.cssText = `height:${barH}px;background:${STAGE_COLORS[s]};width:100%;border-radius:6px 6px 0 0;min-height:${v>0?3:0}px;`;
    spacer.appendChild(bar);
    col.appendChild(spacer);

    wrap.appendChild(col);

    // label below (separate row)
    const lbl = document.createElement('div');
    lbl.style.cssText = 'flex:1;text-align:center;font-size:11px;color:#777;font-weight:500;padding-top:6px;';
    lbl.textContent = s;
    labels.appendChild(lbl);
  });
}

function renderWon(fromStr, toStr) {
  const acts = activeDeals();
  const won = acts.filter(d => closedInRange(d,'won',fromStr,toStr))
    .sort((a,b) => b.amt - a.amt);
  const sec = document.getElementById('wonSection');
  if (!won.length) { sec.innerHTML=''; return; }
  sec.innerHTML = `<div class="callout callout-won">
    <div class="callout-title">&#x2705; Closed Won (${won.length} deal${won.length>1?'s':''})</div>
    ${won.map(d => `<div class="deal-row">
      <div style="flex:1">
        <div class="deal-name">${d.name}</div>
        <div class="deal-meta">${stageTag('won')}${dealTypeTag(d.type)}${d.dept?`<span class="tag" style="background:#f5f5f5;color:#555">${d.dept}</span>`:''}</div>
        <div class="deal-why">${topReasons(d.why, 3)}</div>
      </div>
      <div class="deal-amt">$${d.amt.toLocaleString()}</div>
    </div>`).join('')}
  </div>`;
}

function renderOpen(toStr) {
  const acts = activeDeals();
  const open = acts
    .filter(d => { const s = stageAt(d, toStr); return s && OPEN_STAGES.has(s); })
    .sort((a,b) => b.amt - a.amt)
    .slice(0, 5);
  const sec = document.getElementById('openSection');
  if (!open.length) { sec.innerHTML=''; return; }
  sec.innerHTML = `<div class="callout callout-open">
    <div class="callout-title">&#x1F4CB; Top 5 Open Deals</div>
    ${open.map(d => {
      const s = stageAt(d, toStr);
      return `<div class="deal-row">
        <div style="flex:1">
          <div class="deal-name">${d.name}</div>
          <div class="deal-meta">${stageTag(s)}${dealTypeTag(d.type)}${d.dept?`<span class="tag" style="background:#dbeeff;color:#185FA5">${d.dept}</span>`:''}</div>
          <div class="deal-why">${topReasons(d.why, 4)}</div>
        </div>
        <div class="deal-amt">$${d.amt.toLocaleString()}</div>
      </div>`;
    }).join('')}
  </div>`;
}

function renderLost(fromStr, toStr) {
  const acts = activeDeals();
  const lost = acts
    .filter(d => closedInRange(d,'lost',fromStr,toStr) && d.amt > 12000)
    .sort((a,b) => b.amt - a.amt);
  const sec = document.getElementById('lostSection');
  if (!lost.length) { sec.innerHTML=''; return; }
  sec.innerHTML = `<div class="callout callout-lost">
    <div class="callout-title">&#x26A0;&#xFE0F; High-Value Closed Lost (${lost.length} deal${lost.length>1?'s':''})</div>
    ${lost.map(d => `<div class="deal-row">
      <div style="flex:1">
        <div class="deal-name">${d.name}</div>
        <div class="deal-meta">${stageTag('lost')}${d.lostReason?`<span class="tag" style="background:#f5e0e0;color:#8a1a1a">${d.lostReason}</span>`:''}${dealTypeTag(d.type)}${d.dept?`<span class="tag" style="background:#fde9e9;color:#8a1a1a">${d.dept}</span>`:''}</div>
        ${d.lostDetail?`<div class="lost-detail">${d.lostDetail}</div>`:''}
      </div>
      <div class="deal-amt" style="color:#A32D2D">$${d.amt.toLocaleString()}</div>
    </div>`).join('')}
  </div>`;
}

function render() {
  const fromStr = document.getElementById('fromDate').value;
  const toStr = document.getElementById('toDate').value;
  if (!fromStr || !toStr) return;
  const acts = activeDeals();
  const mFrom = stageMetrics(acts, fromStr);
  const mTo = stageMetrics(acts, toStr);
  renderExclBanner();
  renderKPIs(mFrom, mTo, fromStr, toStr);
  renderChart(mFrom, mTo);
  renderWon(fromStr, toStr);
  renderOpen(toStr);
  renderLost(fromStr, toStr);
}

document.addEventListener('DOMContentLoaded', render);
